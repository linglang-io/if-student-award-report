<!DOCTYPE html>
<!-- Admin Panel - iF Design Student Award Report -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iF Report Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{'if-red':'#C41230','if-dark':'#1a1a2e'}}}}</script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  .fade-in { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .toast { position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:12px;color:#fff;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.15);white-space:nowrap;animation:toastIn .3s ease;max-width:90vw;text-align:center }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  .modal-sheet { animation: sheetUp .25s ease; }
  @keyframes sheetUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  /* 移动端滚动条美化 */
  .overflow-x-auto::-webkit-scrollbar { height:4px; }
  .overflow-x-auto::-webkit-scrollbar-thumb { background:#e5e7eb; border-radius:4px; }
  /* 手机上增大触摸区域 */
  @media (max-width: 640px) {
    .touch-target { min-height:44px; }
    .btn-mobile { min-height:48px; font-size:15px; }
  }
</style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- ==================== 认证界面 ==================== -->
<div id="auth-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-if-dark p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden fade-in">
    <div class="bg-gradient-to-r from-if-red to-red-600 px-8 py-8 text-center">
      <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      <h1 class="text-white text-xl font-bold">iF Report Admin</h1>
      <p class="text-white/70 text-sm mt-1">访问码管理后台</p>
    </div>
    <div class="p-8">
      <label class="block text-sm font-semibold text-gray-700 mb-2">管理员密钥</label>
      <input id="auth-key" type="password" placeholder="请输入管理员密钥" autocomplete="current-password"
        class="w-full px-4 py-3.5 border-2 border-gray-200 rounded-xl text-base focus:border-if-red focus:outline-none transition touch-target"
        onkeydown="if(event.key==='Enter')adminLogin()">
      <button onclick="adminLogin()" class="w-full mt-4 py-3.5 bg-gradient-to-r from-if-red to-red-600 text-white rounded-xl font-semibold text-base btn-mobile hover:shadow-lg transition active:scale-95">
        登录管理后台
      </button>
      <p id="auth-msg" class="mt-3 text-center text-sm text-red-500 min-h-[20px]"></p>
    </div>
  </div>
</div>

<!-- ==================== 管理界面 ==================== -->
<div id="admin-screen" class="hidden">

  <!-- 顶栏 -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 safe-top">
    <div class="px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-if-red rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <span class="font-bold text-gray-800 text-sm sm:text-base">iF Admin</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="showCreateModal()" class="flex items-center gap-1.5 px-3 py-1.5 bg-if-red text-white rounded-lg text-xs sm:text-sm font-semibold btn-mobile active:scale-95 transition sm:hidden">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          新码
        </button>
        <button onclick="adminLogout()" class="px-3 py-1.5 text-gray-500 text-xs sm:text-sm hover:text-if-red transition touch-target">退出</button>
      </div>
    </div>
  </header>

  <main class="px-3 sm:px-6 py-4 sm:py-6 max-w-6xl mx-auto">

    <!-- ==================== 统计卡片（手机2列） ==================== -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2 sm:gap-3 mb-5">
      <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">总访问码</p>
        <p id="st-total-codes" class="text-xl sm:text-2xl font-bold text-gray-800 mt-0.5">-</p>
      </div>
      <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">活跃码</p>
        <p id="st-active-codes" class="text-xl sm:text-2xl font-bold text-green-600 mt-0.5">-</p>
      </div>
      <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">已绑定设备</p>
        <p id="st-total-devices" class="text-xl sm:text-2xl font-bold text-blue-600 mt-0.5">-</p>
      </div>
      <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">今日访问</p>
        <p id="st-today-access" class="text-xl sm:text-2xl font-bold text-if-red mt-0.5">-</p>
      </div>
      <div class="bg-white rounded-xl p-3 sm:p-4 shadow-sm border border-gray-100 col-span-2 sm:col-span-1">
        <p class="text-xs text-gray-400 font-medium">总访问量</p>
        <p id="st-total-access" class="text-xl sm:text-2xl font-bold text-gray-800 mt-0.5">-</p>
      </div>
    </div>

    <!-- ==================== 访问码列表（手机卡片式） ==================== -->
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-base sm:text-lg font-bold text-gray-800">访问码列表</h2>
      <button onclick="showCreateModal()" class="hidden sm:flex items-center gap-2 px-4 py-2.5 bg-if-red text-white rounded-xl text-sm font-semibold active:scale-95 transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        生成访问码
      </button>
    </div>

    <!-- 手机端卡片列表 -->
    <div id="codes-list-mobile" class="sm:hidden space-y-3 mb-4"></div>

    <!-- 平板+桌面端表格 -->
    <div class="hidden sm:block bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-8">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">访问码</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">标签</th>
              <th class="px-4 py-3 text-center font-semibold whitespace-nowrap">状态</th>
              <th class="px-4 py-3 text-center font-semibold whitespace-nowrap">设备</th>
              <th class="px-4 py-3 text-center font-semibold whitespace-nowrap">访问</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">过期时间</th>
              <th class="px-4 py-3 text-center font-semibold whitespace-nowrap">操作</th>
            </tr>
          </thead>
          <tbody id="codes-tbody" class="divide-y divide-gray-50"></tbody>
        </table>
      </div>
    </div>

    <!-- ==================== 访问日志 ==================== -->
    <h2 class="text-base sm:text-lg font-bold text-gray-800 mb-3">最近访问日志</h2>
    <div class="sm:hidden space-y-2" id="logs-list-mobile"></div>
    <div class="hidden sm:block bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">时间</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">访问码</th>
              <th class="px-4 py-3 text-center font-semibold whitespace-nowrap">操作</th>
              <th class="px-4 py-3 text-left font-semibold whitespace-nowrap">IP / 详情</th>
            </tr>
          </thead>
          <tbody id="logs-tbody" class="divide-y divide-gray-50"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ==================== 生成访问码弹窗 ==================== -->
<div id="create-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-end sm:items-center justify-center p-0 sm:p-4" onclick="if(event.target===this)hideCreateModal()">
  <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md shadow-2xl modal-sheet">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h3 class="font-bold text-gray-800 text-base">生成新访问码</h3>
      <button onclick="hideCreateModal()" class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 hover:bg-gray-200 active:scale-95 transition text-xl leading-none">&times;</button>
    </div>
    <div class="px-5 py-5 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">买家备注（选填）</label>
        <input id="create-label" type="text" placeholder="如：张三 / 2024春季"
          class="w-full px-3 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-if-red focus:outline-none transition touch-target">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">可用设备数</label>
        <select id="create-max-devices" class="w-full px-3 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-if-red focus:outline-none transition touch-target appearance-none bg-white">
          <option value="1">1 台设备（适合单人）</option>
          <option value="2">2 台设备（适合共享）</option>
          <option value="3" selected>3 台设备（默认）</option>
          <option value="5">5 台设备（适合团队）</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">有效期</label>
        <select id="create-expires" class="w-full px-3 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-if-red focus:outline-none transition touch-target appearance-none bg-white">
          <option value="">永不过期</option>
          <option value="30">30 天</option>
          <option value="90" selected>90 天（约3个月）</option>
          <option value="180">180 天（约6个月）</option>
          <option value="365">365 天（1年）</option>
        </select>
      </div>
    </div>
    <div class="px-5 pb-6 flex gap-3">
      <button onclick="hideCreateModal()" class="flex-1 py-3 text-gray-600 bg-gray-100 rounded-xl font-semibold text-sm active:scale-95 transition">取消</button>
      <button onclick="createCode()" class="flex-1 py-3 bg-if-red text-white rounded-xl font-semibold text-sm active:scale-95 transition btn-mobile">生成访问码</button>
    </div>
  </div>
</div>

<!-- ==================== 设备详情弹窗 ==================== -->
<div id="devices-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-end sm:items-center justify-center p-0 sm:p-4" onclick="if(event.target===this)hideDevicesModal()">
  <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md shadow-2xl modal-sheet">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h3 class="font-bold text-gray-800 text-base">已绑定设备</h3>
      <button onclick="hideDevicesModal()" class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 hover:bg-gray-200 active:scale-95 transition text-xl leading-none">&times;</button>
    </div>
    <div id="devices-body" class="px-5 py-4 max-h-[60vh] overflow-y-auto"></div>
  </div>
</div>

<!-- ==================== 买家文案弹窗 ==================== -->
<div id="copy-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-end sm:items-center justify-center p-0 sm:p-4" onclick="if(event.target===this)hideCopyModal()">
  <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-lg shadow-2xl modal-sheet">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h3 class="font-bold text-gray-800 text-base">买家文案（点击复制）</h3>
      <button onclick="hideCopyModal()" class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 hover:bg-gray-200 active:scale-95 transition text-xl leading-none">&times;</button>
    </div>
    <div class="px-5 py-5">
      <div id="copy-text-box" class="bg-gray-50 rounded-xl p-4 text-sm text-gray-700 leading-relaxed whitespace-pre-wrap border-2 border-gray-100 focus-within:border-if-red transition cursor-pointer" onclick="copyBuyerText()" title="点击复制">
        <span id="copy-text-content"></span>
        <div class="mt-3 pt-3 border-t border-gray-200 flex items-center justify-center gap-2 text-if-red font-semibold text-xs">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          点击复制文案
        </div>
      </div>
    </div>
    <div class="px-5 pb-6">
      <button onclick="copyBuyerText()" class="w-full py-3 bg-if-red text-white rounded-xl font-semibold text-sm active:scale-95 transition btn-mobile flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        复制文案
      </button>
    </div>
  </div>
</div>

<!-- ==================== 撤销确认弹窗 ==================== -->
<div id="revoke-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-end sm:items-center justify-center p-0 sm:p-4" onclick="if(event.target===this)hideRevokeModal()">
  <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-sm shadow-2xl modal-sheet">
    <div class="px-5 py-6 text-center">
      <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
      </div>
      <h3 class="font-bold text-gray-800 text-base mb-2">确认撤销访问码？</h3>
      <p class="text-gray-500 text-sm">撤销后该用户将无法继续访问，确认操作吗？</p>
    </div>
    <div class="px-5 pb-6 flex gap-3">
      <button onclick="hideRevokeModal()" class="flex-1 py-3 text-gray-600 bg-gray-100 rounded-xl font-semibold text-sm active:scale-95 transition">取消</button>
      <button onclick="confirmRevoke()" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-semibold text-sm active:scale-95 transition">确认撤销</button>
    </div>
  </div>
</div>

<script>
// ============ Config ============
const ADMIN_URL = 'https://kghkycnjhivkrjfshfob.supabase.co';
let ADMIN_KEY = '';
let pendingRevokeId = null;
let lastCreatedCode = null;

// ============ 安全工具 ============
// HTML 转义，防止 XSS 注入（label/user_agent 等用户数据插入 innerHTML 前必须调用）
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// ============ Auth ============
function adminLogin() {
  const key = document.getElementById('auth-key').value.trim();
  if (!key) { document.getElementById('auth-msg').textContent = '请输入管理员密钥'; return; }
  ADMIN_KEY = key;
  document.getElementById('auth-msg').textContent = '验证中...';
  callAdmin({ action: 'stats' }).then(res => {
    if (res.ok) {
      localStorage.setItem('if_admin_key', key);
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('admin-screen').classList.remove('hidden');
      loadDashboard();
    } else {
      document.getElementById('auth-msg').textContent = '密钥错误，请重试';
    }
  }).catch(() => {
    document.getElementById('auth-msg').textContent = '连接失败，请检查网络';
  });
}

function adminLogout() {
  ADMIN_KEY = '';
  localStorage.removeItem('if_admin_key');
  document.getElementById('admin-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('auth-key').value = '';
}

(function autoRestore() {
  const saved = localStorage.getItem('if_admin_key');
  if (saved) {
    ADMIN_KEY = saved;
    document.getElementById('auth-key').value = saved;
    document.getElementById('auth-msg').textContent = '自动登录中...';
    callAdmin({ action: 'stats' }).then(res => {
      if (res.ok) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.remove('hidden');
        loadDashboard();
      } else {
        document.getElementById('auth-msg').textContent = '';
      }
    }).catch(() => { document.getElementById('auth-msg').textContent = ''; });
  }
})();

// ============ API ============
async function callAdmin(body) {
  const res = await fetch(ADMIN_URL + '/functions/v1/admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ============ Dashboard ============
async function loadDashboard() {
  const [statsRes, codesRes, logsRes] = await Promise.all([
    callAdmin({ action: 'stats' }),
    callAdmin({ action: 'list_codes' }),
    callAdmin({ action: 'logs', limit: 30 }),
  ]);
  if (statsRes.ok) renderStats(statsRes.stats);
  if (codesRes.ok) { renderCodesDesktop(codesRes.codes); renderCodesMobile(codesRes.codes); }
  if (logsRes.ok) { renderLogsDesktop(logsRes.logs); renderLogsMobile(logsRes.logs); }
}

function renderStats(s) {
  document.getElementById('st-total-codes').textContent = s.total_codes || 0;
  document.getElementById('st-active-codes').textContent = s.active_codes || 0;
  document.getElementById('st-total-devices').textContent = s.total_devices || 0;
  document.getElementById('st-today-access').textContent = s.today_access || 0;
  document.getElementById('st-total-access').textContent = s.total_access || 0;
}

// ============ 桌面端表格渲染 ============
function renderCodesDesktop(codes) {
  const tbody = document.getElementById('codes-tbody');
  if (!codes || codes.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-12 text-center text-gray-400">暂无访问码，点击上方"生成访问码"创建</td></tr>';
    return;
  }
  tbody.innerHTML = codes.map(c => {
    const status = getCodeStatus(c);
    const expiresText = c.expires_at ? new Date(c.expires_at).toLocaleDateString('zh-CN') : '永不过期';
    return `<tr class="hover:bg-gray-50 transition text-sm">
      <td class="px-4 py-3 font-mono font-bold text-if-red tracking-widest whitespace-nowrap">${escapeHtml(c.code)}</td>
      <td class="px-4 py-3 text-gray-600 max-w-[100px] truncate">${c.label ? escapeHtml(c.label) : '<span class="text-gray-300">—</span>'}</td>
      <td class="px-4 py-3 text-center whitespace-nowrap"><span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium badge-${status.class}">${status.text}</span></td>
      <td class="px-4 py-3 text-center whitespace-nowrap"><button onclick='showDevices(${JSON.stringify(c.devices||[]).replace(/'/g,"\\'")},"${escapeHtml(c.code)}")' class="text-blue-600 hover:text-blue-800 font-medium">${c.device_count}/${c.max_devices}</button></td>
      <td class="px-4 py-3 text-center font-medium whitespace-nowrap">${c.access_count}</td>
      <td class="px-4 py-3 text-gray-500 text-xs whitespace-nowrap">${expiresText}</td>
      <td class="px-4 py-3 text-center whitespace-nowrap">
        ${c.is_active
          ? `<button onclick="showRevokeModal('${c.id}')" class="text-xs px-2.5 py-1 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-medium transition active:scale-95">撤销</button>`
          : `<button onclick="activateCode('${c.id}')" class="text-xs px-2.5 py-1 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 font-medium transition active:scale-95">启用</button>`
        }
      </td>
    </tr>`;
  }).join('');
}

// ============ 移动端卡片渲染 ============
function renderCodesMobile(codes) {
  const list = document.getElementById('codes-list-mobile');
  if (!codes || codes.length === 0) {
    list.innerHTML = '<div class="bg-white rounded-xl p-8 text-center text-gray-400 text-sm shadow-sm border border-gray-100">暂无访问码</div>';
    return;
  }
  list.innerHTML = codes.map(c => {
    const status = getCodeStatus(c);
    const expiresText = c.expires_at ? new Date(c.expires_at).toLocaleDateString('zh-CN') : '永不过期';
    const deviceBar = Array.from({length: c.max_devices}, (_, i) =>
      `<div class="w-4 h-2 rounded-full ${i < c.device_count ? 'bg-blue-500' : 'bg-gray-200'}"></div>`
    ).join('');
    return `<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
      <div class="flex items-start justify-between mb-3">
        <div>
          <span class="font-mono font-bold text-if-red text-lg tracking-wider">${escapeHtml(c.code)}</span>
          ${c.label ? `<span class="ml-2 text-xs text-gray-400">${escapeHtml(c.label)}</span>` : ''}
        </div>
        <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium badge-${status.class} flex-shrink-0">${status.text}</span>
      </div>
      <div class="flex items-center gap-4 text-xs text-gray-500 mb-3">
        <span>过期: <b class="text-gray-700">${expiresText}</b></span>
        <span>访问 <b class="text-gray-700">${c.access_count}</b> 次</span>
      </div>
      <div class="flex items-center gap-2 mb-3">
        <span class="text-xs text-gray-400">设备:</span>
        <div class="flex gap-1">${deviceBar}</div>
        <span class="text-xs text-gray-500">${c.device_count}/${c.max_devices}</span>
      </div>
      <div class="flex gap-2">
        <button onclick='showDevices(${JSON.stringify(c.devices||[]).replace(/'/g,"\\'")},"${escapeHtml(c.code)}")' class="flex-1 py-2.5 text-xs text-blue-600 bg-blue-50 rounded-xl font-semibold active:scale-95 transition">设备详情</button>
        ${c.is_active
          ? `<button onclick="showRevokeModal('${c.id}')" class="flex-1 py-2.5 text-xs text-red-600 bg-red-50 rounded-xl font-semibold active:scale-95 transition">撤销访问</button>`
          : `<button onclick="activateCode('${c.id}')" class="flex-1 py-2.5 text-xs text-green-600 bg-green-50 rounded-xl font-semibold active:scale-95 transition">重新启用</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function getCodeStatus(c) {
  if (!c.is_active) return { text: '已撤销', class: 'revoked' };
  if (c.expires_at && new Date(c.expires_at) < new Date()) return { text: '已过期', class: 'expired' };
  return { text: '活跃', class: 'active' };
}

// ============ 日志渲染 ============
function renderLogsDesktop(logs) {
  const tbody = document.getElementById('logs-tbody');
  if (!logs || logs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-12 text-center text-gray-400">暂无访问日志</td></tr>';
    return;
  }
  const actionLabels = {
    verify: ['验证通过', 'bg-green-100 text-green-700'],
    session_check: ['会话续期', 'bg-blue-100 text-blue-700'],
    denied: ['拒绝访问', 'bg-red-100 text-red-700'],
  };
  tbody.innerHTML = logs.map(l => {
    const time = new Date(l.created_at).toLocaleString('zh-CN');
    const code = l.access_codes ? l.access_codes.code : '-';
    const label = l.access_codes ? (l.access_codes.label || '') : '';
    const [actionText, actionClass] = actionLabels[l.action] || [l.action, 'bg-gray-100 text-gray-700'];
    const meta = l.metadata && Object.keys(l.metadata).length > 0
      ? Object.entries(l.metadata).map(([k,v]) => `${k}: ${v}`).join(', ')
      : (l.ip_address || '-');
    return `<tr class="hover:bg-gray-50 transition text-sm">
      <td class="px-4 py-3 text-gray-400 text-xs whitespace-nowrap">${time}</td>
      <td class="px-4 py-3 whitespace-nowrap"><span class="font-mono text-if-red font-medium">${escapeHtml(code)}</span>${label ? `<span class="text-gray-400 text-xs ml-1">${escapeHtml(label)}</span>` : ''}</td>
      <td class="px-4 py-3 text-center whitespace-nowrap"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${actionClass}">${escapeHtml(actionText)}</span></td>
      <td class="px-4 py-3 text-gray-400 text-xs">${escapeHtml(meta)}</td>
    </tr>`;
  }).join('');
}

function renderLogsMobile(logs) {
  const list = document.getElementById('logs-list-mobile');
  if (!logs || logs.length === 0) {
    list.innerHTML = '<div class="bg-white rounded-xl p-8 text-center text-gray-400 text-sm shadow-sm border border-gray-100">暂无访问日志</div>';
    return;
  }
  const actionLabels = {
    verify: ['验证通过', 'bg-green-100 text-green-700'],
    session_check: ['会话续期', 'bg-blue-100 text-blue-700'],
    denied: ['拒绝访问', 'bg-red-100 text-red-700'],
  };
  list.innerHTML = logs.slice(0, 20).map(l => {
    const time = new Date(l.created_at).toLocaleString('zh-CN');
    const code = l.access_codes ? l.access_codes.code : '-';
    const [actionText, actionClass] = actionLabels[l.action] || [l.action, 'bg-gray-100 text-gray-700'];
    return `<div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 flex items-center gap-3">
      <span class="px-2 py-0.5 rounded-full text-xs font-medium ${actionClass} flex-shrink-0">${actionText}</span>
      <div class="flex-1 min-w-0">
        <span class="font-mono font-bold text-if-red text-sm">${code}</span>
        <p class="text-xs text-gray-400 truncate">${l.ip_address || '-'}</p>
      </div>
      <span class="text-xs text-gray-400 flex-shrink-0">${time.split(' ')[1] || time}</span>
    </div>`;
  }).join('');
}

// ============ 创建访问码 ============
function showCreateModal() {
  document.getElementById('create-modal').classList.remove('hidden');
  document.getElementById('create-modal').classList.add('flex');
  document.getElementById('create-label').value = '';
}
function hideCreateModal() {
  document.getElementById('create-modal').classList.add('hidden');
  document.getElementById('create-modal').classList.remove('flex');
}

async function createCode() {
  const label = document.getElementById('create-label').value.trim();
  const max_devices = parseInt(document.getElementById('create-max-devices').value);
  const expires_days = document.getElementById('create-expires').value;
  const body = { action: 'create_code', label, max_devices };
  if (expires_days) body.expires_days = parseInt(expires_days);
  const res = await callAdmin(body);
  if (res.ok) {
    hideCreateModal();
    lastCreatedCode = { ...res.code, max_devices, label };
    showCopyModal(lastCreatedCode);
    loadDashboard();
  } else {
    toast('生成失败: ' + res.error, 'error');
  }
}

// ============ 撤销操作 ============
function showRevokeModal(id) {
  pendingRevokeId = id;
  document.getElementById('revoke-modal').classList.remove('hidden');
  document.getElementById('revoke-modal').classList.add('flex');
}
function hideRevokeModal() {
  pendingRevokeId = null;
  document.getElementById('revoke-modal').classList.add('hidden');
  document.getElementById('revoke-modal').classList.remove('flex');
}
async function confirmRevoke() {
  if (!pendingRevokeId) {
    toast('操作异常，请刷新页面后重试', 'error');
    return;
  }
  const codeId = pendingRevokeId;
  hideRevokeModal();
  try {
    const res = await callAdmin({ action: 'revoke_code', code_id: codeId });
    if (res.ok) { toast('已撤销', 'success'); loadDashboard(); }
    else toast('撤销失败: ' + (res.error || '未知错误'), 'error');
  } catch(e) {
    toast('网络错误，请检查网络后重试', 'error');
  }
}

async function activateCode(id) {
  try {
    const res = await callAdmin({ action: 'activate_code', code_id: id });
    if (res.ok) { toast('已启用', 'success'); loadDashboard(); }
    else toast('启用失败: ' + (res.error || '未知错误'), 'error');
  } catch(e) {
    toast('网络错误，请检查网络后重试', 'error');
  }
}

// ============ 设备详情 ============
function showDevices(devices, code) {
  const body = document.getElementById('devices-body');
  if (!devices || devices.length === 0) {
    body.innerHTML = '<p class="text-gray-400 text-center py-8 text-sm">暂无设备绑定</p>';
  } else {
    body.innerHTML = devices.map(d => {
      const lastActive = new Date(d.last_active_at).toLocaleString('zh-CN');
      const expires = new Date(d.expires_at).toLocaleDateString('zh-CN');
      return `<div class="border border-gray-100 rounded-xl p-4 mb-3 last:mb-0">
        <div class="flex items-start justify-between mb-2">
          <div class="flex-1 min-w-0">
            <p class="text-xs text-gray-400 font-mono truncate">${escapeHtml(d.fingerprint || '-')}</p>
            <p class="text-sm text-gray-600 mt-0.5 truncate">${escapeHtml(d.user_agent ? d.user_agent.substring(0, 50) : '-')}</p>
          </div>
          <button onclick="deleteDevice('${d.id}')" class="ml-2 text-xs px-2.5 py-1 text-red-500 bg-red-50 rounded-lg hover:bg-red-100 transition flex-shrink-0">解绑</button>
        </div>
        <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-400">
          <span>最近: ${escapeHtml(lastActive)}</span>
          <span>过期: ${escapeHtml(expires)}</span>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('devices-modal').classList.remove('hidden');
  document.getElementById('devices-modal').classList.add('flex');
}
function hideDevicesModal() {
  document.getElementById('devices-modal').classList.add('hidden');
  document.getElementById('devices-modal').classList.remove('flex');
}

async function deleteDevice(id) {
  if (!confirm('确认解绑此设备？')) return;
  const res = await callAdmin({ action: 'delete_device', device_id: id });
  if (res.ok) { toast('设备已解绑', 'success'); hideDevicesModal(); loadDashboard(); }
  else toast('操作失败', 'error');
}

// ============ 买家文案弹窗 ============
function showCopyModal(code) {
  const expiresText = code.expires_at
    ? new Date(code.expires_at).toLocaleDateString('zh-CN')
    : '永久有效';
  const deviceText = {1:'1台',2:'2台',3:'3台',5:'5台'}[code.max_devices] || code.max_devices + '台';

  const text = `你好！

感谢购买 iF Design Student Award 备赛数据策略报告 🎉

请通过以下链接访问报告，并用下方的访问码解锁：

🔗 报告地址：
https://linglang-io.github.io/if-student-award-report/

🔑 访问码：
${code.code}

📋 访问规则：
• 同一访问码最多可在 ${deviceText} 设备上使用
• 解锁后 30 天内无需重复输入访问码
• 有效期至：${expiresText}

祝你备赛顺利，如有任何问题欢迎随时联系！

—— iF Student Award 备赛策略团队`;

  document.getElementById('copy-text-content').textContent = text;
  document.getElementById('copy-modal').classList.remove('hidden');
  document.getElementById('copy-modal').classList.add('flex');
}

function hideCopyModal() {
  document.getElementById('copy-modal').classList.add('hidden');
  document.getElementById('copy-modal').classList.remove('flex');
}

function copyBuyerText() {
  const text = document.getElementById('copy-text-content').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      toast('文案已复制到剪贴板！', 'success');
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); toast('文案已复制！', 'success'); } catch(e) { toast('复制失败，请手动复制', 'error'); }
  document.body.removeChild(ta);
}

// ============ Toast ============
function toast(msg, type) {
  // 移除已有的 toast
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = type === 'success' ? '#10b981' : '#ef4444';
  el.style.whiteSpace = 'normal';
  el.style.wordBreak = 'break-word';
  el.style.maxWidth = '90vw';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }, 2500);
  setTimeout(() => el.remove(), 3000);
}
</script>
