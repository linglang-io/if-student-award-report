<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iF Report Admin — 访问码管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{'if-red':'#C41230','if-dark':'#1a1a2e'}}}}</script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  .stat-card { transition: transform .15s; }
  .stat-card:hover { transform: translateY(-2px); }
  .badge-active { background: #dcfce7; color: #166534; }
  .badge-revoked { background: #fee2e2; color: #991b1b; }
  .badge-expired { background: #fef3c7; color: #92400e; }
  .fade-in { animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .toast { position:fixed;top:20px;right:20px;z-index:1000;padding:12px 20px;border-radius:10px;color:#fff;font-size:14px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- 认证界面 -->
<div id="auth-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-if-dark">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
    <div class="bg-gradient-to-r from-if-red to-red-600 px-8 py-6 text-center">
      <h1 class="text-white text-xl font-bold">iF Report Admin</h1>
      <p class="text-white/70 text-sm mt-1">访问码管理后台</p>
    </div>
    <div class="p-8">
      <label class="block text-sm font-semibold text-gray-700 mb-2">管理员密钥</label>
      <input id="auth-key" type="password" placeholder="请输入管理员密钥"
        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:border-if-red focus:outline-none transition"
        onkeydown="if(event.key==='Enter')adminLogin()">
      <button onclick="adminLogin()" class="w-full mt-4 py-3 bg-gradient-to-r from-if-red to-red-600 text-white rounded-xl font-semibold text-sm hover:shadow-lg transition">
        登录管理后台
      </button>
      <p id="auth-msg" class="mt-3 text-center text-sm text-red-500"></p>
    </div>
  </div>
</div>

<!-- 管理界面 -->
<div id="admin-screen" class="hidden">
  <!-- 顶栏 -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-if-red rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <span class="font-bold text-gray-800">iF Report Admin</span>
      </div>
      <button onclick="adminLogout()" class="text-sm text-gray-500 hover:text-if-red transition">退出登录</button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6">

    <!-- 统计卡片 -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
      <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">总访问码</p>
        <p id="st-total-codes" class="text-2xl font-bold text-gray-800 mt-1">-</p>
      </div>
      <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">活跃码</p>
        <p id="st-active-codes" class="text-2xl font-bold text-green-600 mt-1">-</p>
      </div>
      <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">已绑定设备</p>
        <p id="st-total-devices" class="text-2xl font-bold text-blue-600 mt-1">-</p>
      </div>
      <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">今日访问</p>
        <p id="st-today-access" class="text-2xl font-bold text-if-red mt-1">-</p>
      </div>
      <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <p class="text-xs text-gray-400 font-medium">总访问量</p>
        <p id="st-total-access" class="text-2xl font-bold text-gray-800 mt-1">-</p>
      </div>
    </div>

    <!-- 操作区 -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-4">
      <h2 class="text-lg font-bold text-gray-800">访问码管理</h2>
      <button onclick="showCreateModal()" class="flex items-center gap-2 px-4 py-2.5 bg-if-red text-white rounded-xl text-sm font-semibold hover:bg-red-700 transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        生成访问码
      </button>
    </div>

    <!-- 访问码列表 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
              <th class="px-4 py-3 text-left font-semibold">访问码</th>
              <th class="px-4 py-3 text-left font-semibold">标签</th>
              <th class="px-4 py-3 text-center font-semibold">状态</th>
              <th class="px-4 py-3 text-center font-semibold">设备</th>
              <th class="px-4 py-3 text-center font-semibold">访问次数</th>
              <th class="px-4 py-3 text-left font-semibold">创建时间</th>
              <th class="px-4 py-3 text-left font-semibold">过期时间</th>
              <th class="px-4 py-3 text-center font-semibold">操作</th>
            </tr>
          </thead>
          <tbody id="codes-tbody" class="divide-y divide-gray-50">
            <tr><td colspan="8" class="px-4 py-12 text-center text-gray-400">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 访问日志 -->
    <h2 class="text-lg font-bold text-gray-800 mt-10 mb-4">最近访问日志</h2>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
              <th class="px-4 py-3 text-left font-semibold">时间</th>
              <th class="px-4 py-3 text-left font-semibold">访问码</th>
              <th class="px-4 py-3 text-center font-semibold">操作</th>
              <th class="px-4 py-3 text-left font-semibold">IP</th>
              <th class="px-4 py-3 text-left font-semibold">详情</th>
            </tr>
          </thead>
          <tbody id="logs-tbody" class="divide-y divide-gray-50">
            <tr><td colspan="5" class="px-4 py-12 text-center text-gray-400">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- 创建访问码弹窗 -->
<div id="create-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4" onclick="if(event.target===this)hideCreateModal()">
  <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl fade-in">
    <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
      <h3 class="font-bold text-gray-800">生成新访问码</h3>
      <button onclick="hideCreateModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 hover:bg-gray-200">&times;</button>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">标签（买家备注）</label>
        <input id="create-label" type="text" placeholder="如：张三 / 2024春季购买"
          class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:border-if-red focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">最大设备数</label>
        <select id="create-max-devices" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:border-if-red focus:outline-none">
          <option value="1">1 台设备</option>
          <option value="2">2 台设备</option>
          <option value="3" selected>3 台设备（默认）</option>
          <option value="5">5 台设备</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">有效期</label>
        <select id="create-expires" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:border-if-red focus:outline-none">
          <option value="">永不过期</option>
          <option value="30">30 天</option>
          <option value="90" selected>90 天</option>
          <option value="180">180 天</option>
          <option value="365">365 天</option>
        </select>
      </div>
    </div>
    <div class="px-6 py-4 bg-gray-50 rounded-b-2xl flex justify-end gap-3">
      <button onclick="hideCreateModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">取消</button>
      <button onclick="createCode()" class="px-5 py-2 bg-if-red text-white rounded-lg text-sm font-semibold hover:bg-red-700 transition">生成</button>
    </div>
  </div>
</div>

<!-- 设备详情弹窗 -->
<div id="devices-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4" onclick="if(event.target===this)hideDevicesModal()">
  <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl fade-in">
    <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
      <h3 class="font-bold text-gray-800">已绑定设备</h3>
      <button onclick="hideDevicesModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 hover:bg-gray-200">&times;</button>
    </div>
    <div id="devices-body" class="px-6 py-5 max-h-[60vh] overflow-y-auto">
    </div>
  </div>
</div>

<script>
// ============ Configuration ============
// 从 localStorage 或 URL 参数读取配置
let ADMIN_URL = 'https://kghkycnjhivkrjfshfob.supabase.co';  // Supabase Edge Function URL
let ADMIN_KEY = '';  // 管理员密钥

function getConfig() {
  const saved = localStorage.getItem('if_admin_config');
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return null;
}

function saveConfig(url, key) {
  localStorage.setItem('if_admin_config', JSON.stringify({ url, key }));
}

// ============ Auth ============
function adminLogin() {
  const key = document.getElementById('auth-key').value.trim();
  if (!key) { document.getElementById('auth-msg').textContent = '请输入管理员密钥'; return; }

  ADMIN_KEY = key;

  // 测试连接
  callAdmin({ action: 'stats' }).then(res => {
    if (res.ok) {
      saveConfig(ADMIN_URL, ADMIN_KEY);
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('admin-screen').classList.remove('hidden');
      loadDashboard();
    } else {
      document.getElementById('auth-msg').textContent = '认证失败: ' + (res.error || '未知错误');
    }
  }).catch(e => {
    document.getElementById('auth-msg').textContent = '连接失败，请检查 URL 和网络';
  });
}

function adminLogout() {
  ADMIN_KEY = '';
  localStorage.removeItem('if_admin_config');
  document.getElementById('admin-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('auth-key').value = '';
}

// 页面加载时自动恢复
(function autoRestore() {
  const saved = getConfig();
  if (saved && saved.key) {
    ADMIN_URL = saved.url;
    ADMIN_KEY = saved.key;
    callAdmin({ action: 'stats' }).then(res => {
      if (res.ok) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.remove('hidden');
        loadDashboard();
      }
    }).catch(() => {});
  }
})();

// ============ API ============
async function callAdmin(body) {
  const res = await fetch(ADMIN_URL + '/functions/v1/admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ============ Dashboard ============
async function loadDashboard() {
  try {
    const [statsRes, codesRes, logsRes] = await Promise.all([
      callAdmin({ action: 'stats' }),
      callAdmin({ action: 'list_codes' }),
      callAdmin({ action: 'logs', limit: 30 }),
    ]);

    if (statsRes.ok) renderStats(statsRes.stats);
    if (codesRes.ok) renderCodes(codesRes.codes);
    if (logsRes.ok) renderLogs(logsRes.logs);
  } catch(e) {
    toast('加载数据失败', 'error');
  }
}

function renderStats(s) {
  document.getElementById('st-total-codes').textContent = s.total_codes;
  document.getElementById('st-active-codes').textContent = s.active_codes;
  document.getElementById('st-total-devices').textContent = s.total_devices;
  document.getElementById('st-today-access').textContent = s.today_access;
  document.getElementById('st-total-access').textContent = s.total_access;
}

function renderCodes(codes) {
  const tbody = document.getElementById('codes-tbody');
  if (!codes || codes.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-12 text-center text-gray-400">暂无访问码，点击上方"生成访问码"创建</td></tr>';
    return;
  }
  tbody.innerHTML = codes.map(c => {
    const status = getCodeStatus(c);
    const statusBadge = `<span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium badge-${status.class}">${status.text}</span>`;
    const createdAt = new Date(c.created_at).toLocaleDateString('zh-CN');
    const expiresAt = c.expires_at ? new Date(c.expires_at).toLocaleDateString('zh-CN') : '永不';
    return `<tr class="hover:bg-gray-50 transition">
      <td class="px-4 py-3 font-mono font-bold text-if-red tracking-wider">${c.code}</td>
      <td class="px-4 py-3 text-gray-600">${c.label || '<span class="text-gray-300">-</span>'}</td>
      <td class="px-4 py-3 text-center">${statusBadge}</td>
      <td class="px-4 py-3 text-center">
        <button onclick='showDevices(${JSON.stringify(c.devices||[]).replace(/'/g,"\\'")},"${c.code}")' class="text-blue-600 hover:text-blue-800 font-medium">
          ${c.device_count}/${c.max_devices}
        </button>
      </td>
      <td class="px-4 py-3 text-center font-medium">${c.access_count}</td>
      <td class="px-4 py-3 text-gray-500">${createdAt}</td>
      <td class="px-4 py-3 text-gray-500">${expiresAt}</td>
      <td class="px-4 py-3 text-center">
        ${c.is_active
          ? `<button onclick="revokeCode('${c.id}')" class="text-xs px-3 py-1 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-medium transition">撤销</button>`
          : `<button onclick="activateCode('${c.id}')" class="text-xs px-3 py-1 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 font-medium transition">启用</button>`
        }
      </td>
    </tr>`;
  }).join('');
}

function getCodeStatus(c) {
  if (!c.is_active) return { text: '已撤销', class: 'revoked' };
  if (c.expires_at && new Date(c.expires_at) < new Date()) return { text: '已过期', class: 'expired' };
  return { text: '活跃', class: 'active' };
}

function renderLogs(logs) {
  const tbody = document.getElementById('logs-tbody');
  if (!logs || logs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-12 text-center text-gray-400">暂无访问日志</td></tr>';
    return;
  }
  const actionLabels = {
    verify: ['验证通过', 'bg-green-100 text-green-700'],
    session_check: ['会话续期', 'bg-blue-100 text-blue-700'],
    denied: ['拒绝访问', 'bg-red-100 text-red-700'],
  };
  tbody.innerHTML = logs.map(l => {
    const time = new Date(l.created_at).toLocaleString('zh-CN');
    const code = l.access_codes ? l.access_codes.code : '-';
    const label = l.access_codes ? l.access_codes.label : '';
    const [actionText, actionClass] = actionLabels[l.action] || [l.action, 'bg-gray-100 text-gray-700'];
    const meta = l.metadata && Object.keys(l.metadata).length > 0
      ? Object.entries(l.metadata).map(([k,v]) => `${k}: ${v}`).join(', ')
      : '-';
    return `<tr class="hover:bg-gray-50 transition">
      <td class="px-4 py-3 text-gray-500 text-xs whitespace-nowrap">${time}</td>
      <td class="px-4 py-3"><span class="font-mono text-if-red font-medium">${code}</span> <span class="text-gray-400 text-xs">${label}</span></td>
      <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${actionClass}">${actionText}</span></td>
      <td class="px-4 py-3 text-gray-500 text-xs font-mono">${l.ip_address || '-'}</td>
      <td class="px-4 py-3 text-gray-400 text-xs">${meta}</td>
    </tr>`;
  }).join('');
}

// ============ Actions ============
function showCreateModal() {
  document.getElementById('create-modal').classList.remove('hidden');
  document.getElementById('create-modal').classList.add('flex');
  document.getElementById('create-label').value = '';
}

function hideCreateModal() {
  document.getElementById('create-modal').classList.add('hidden');
  document.getElementById('create-modal').classList.remove('flex');
}

async function createCode() {
  const label = document.getElementById('create-label').value.trim();
  const max_devices = parseInt(document.getElementById('create-max-devices').value);
  const expires_days = document.getElementById('create-expires').value;

  const body = { action: 'create_code', label, max_devices };
  if (expires_days) body.expires_days = parseInt(expires_days);

  const res = await callAdmin(body);
  if (res.ok) {
    hideCreateModal();
    toast('访问码已生成: ' + res.code.code, 'success');
    loadDashboard();
  } else {
    toast('生成失败: ' + res.error, 'error');
  }
}

async function revokeCode(codeId) {
  if (!confirm('确认撤销此访问码？撤销后对应用户将无法继续访问。')) return;
  const res = await callAdmin({ action: 'revoke_code', code_id: codeId });
  if (res.ok) {
    toast('已撤销', 'success');
    loadDashboard();
  } else {
    toast('操作失败: ' + res.error, 'error');
  }
}

async function activateCode(codeId) {
  const res = await callAdmin({ action: 'activate_code', code_id: codeId });
  if (res.ok) {
    toast('已重新启用', 'success');
    loadDashboard();
  } else {
    toast('操作失败: ' + res.error, 'error');
  }
}

function showDevices(devices, code) {
  const body = document.getElementById('devices-body');
  if (!devices || devices.length === 0) {
    body.innerHTML = '<p class="text-gray-400 text-center py-8">暂无设备绑定</p>';
  } else {
    body.innerHTML = devices.map(d => {
      const created = new Date(d.created_at).toLocaleString('zh-CN');
      const lastActive = new Date(d.last_active_at).toLocaleString('zh-CN');
      const expires = new Date(d.expires_at).toLocaleDateString('zh-CN');
      const fpShort = d.fingerprint ? d.fingerprint.substring(0, 12) + '...' : '-';
      return `<div class="border border-gray-100 rounded-xl p-4 mb-3 hover:border-gray-200 transition">
        <div class="flex items-start justify-between mb-2">
          <div>
            <p class="text-xs text-gray-400 font-mono">${fpShort}</p>
            <p class="text-sm text-gray-600 mt-1">${d.user_agent ? d.user_agent.substring(0, 60) + '...' : '-'}</p>
          </div>
          <button onclick="deleteDevice('${d.id}')" class="text-xs px-2 py-1 text-red-500 hover:bg-red-50 rounded-lg transition" title="解绑此设备">解绑</button>
        </div>
        <div class="flex gap-4 text-xs text-gray-400 mt-2">
          <span>IP: ${d.ip_address || '-'}</span>
          <span>绑定: ${created}</span>
          <span>最近: ${lastActive}</span>
          <span>过期: ${expires}</span>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('devices-modal').classList.remove('hidden');
  document.getElementById('devices-modal').classList.add('flex');
}

function hideDevicesModal() {
  document.getElementById('devices-modal').classList.add('hidden');
  document.getElementById('devices-modal').classList.remove('flex');
}

async function deleteDevice(deviceId) {
  if (!confirm('确认解绑此设备？该设备将需要重新验证访问码。')) return;
  const res = await callAdmin({ action: 'delete_device', device_id: deviceId });
  if (res.ok) {
    toast('设备已解绑', 'success');
    hideDevicesModal();
    loadDashboard();
  } else {
    toast('操作失败: ' + res.error, 'error');
  }
}

// ============ Toast ============
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#6b7280';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }, 2500);
  setTimeout(() => el.remove(), 3000);
}
</script>
</body>
</html>
